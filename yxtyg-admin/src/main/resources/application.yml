server:
  port: 10010
  # 增加请求体大小限制，支持Base64大图片传输
  tomcat:
    max-http-form-post-size: 100MB
    max-swallow-size: 100MB
    # 启用 UTF-8 编码的响应头
    uri-encoding: UTF-8
  servlet:
    # 响应编码
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: yxtyg-admin
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/yxtyg_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  # 增加JSON请求体大小限制，支持Base64大图片传输
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.jscm.yxtyg.entity
  configuration:
    map-underscore-to-camel-case: true
    # 关闭 MyBatis 自带的 SQL 日志，使用 Logback 统一输出
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    root: INFO
    com.jscm.yxtyg: DEBUG
  file:
    path: ./logs
    name: ./logs/yxtyg-admin.log
  retention-days: 10

# AI配置
ai:
  ollama:
    url: ${AI_OLLAMA_URL:http://gugang.i234.me:11868}
    # url: http://localhost:11434
    model: ${AI_OLLAMA_MODEL:qwen3:8b}

recommend:
  top-k: 10
  max-prompt-tickets: 10
  max-ticket-content-length: 2000
  max-current-content-length: 500
  max-history-content-length: 200
  max-history-solution-length: 300
  llm-timeout-ms: 300000

vector:
  store:
    path: ./data/vectors
  vectorizable-statuses:
    - 已回复
    - 关闭
    - 已完成
